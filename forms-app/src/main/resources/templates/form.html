<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #eef2fb 0%, #ffffff 100%);
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        width: 100%;
        max-width: 420px;
        background: #ffffff;
        border-radius: 18px;
        box-shadow: 0 20px 50px rgba(31, 41, 55, 0.12);
        padding: 32px;
        box-sizing: border-box;
    }

    .form-group {
        margin-bottom: 20px;
    }

    h1 {
        margin: 0 0 18px;
        font-size: 1.9rem;
        color: #1f2937;
        text-align: center;
    }

    label {
        display: block;
        margin-bottom: 8px;
        color: #4b5563;
        font-weight: 600;
    }

    input[type="text"],
    input[type="email"] {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        background: #f8fafc;
        font-size: 0.98rem;
        color: #111827;
        box-sizing: border-box;
    }

    input[type="text"]:focus,
    input[type="email"]:focus {
        outline: none;
        border-color: #6366f1;
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
    }

    button[type="submit"] {
        width: 100%;
        padding: 12px 16px;
        border: none;
        border-radius: 12px;
        background: #4f46e5;
        color: #ffffff;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.2s ease;
    }

    button[type="submit"]:hover {
        background: #4338ca;
    }

    button[type="submit"]:active {
        transform: translateY(1px);
    }
</style>
<div class="container">
    <div class="form-group">
        <h1>Form</h1>
        <form th:action="@{/submit}" th:object="${userform}" method="post">
            <div class="form-group">
                <label>Name:</label>
                <input type="text" placeholder="Dinesh" th:field="*{name}" required>
                <br>
            </div>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" placeholder="3200584@dsengg.ac.in" th:field="*{email}" required>
                <br><br>
            </div>
            
            
            <button type="submit">Submit</button>
        </form>
    </div>
</div>
